services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
    volumes:
      - ${POSTGRES_DATA_PATH:-./data/postgres}:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: ${KERNO_IMAGE:?KERNO_IMAGE is required}:${KERNO_TAG:-develop}
    restart: unless-stopped
    env_file:
      - ${APP_ENV_FILE:-./data/.env}
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      NODE_ENV: production
      PORT: 5000
    ports:
      - "127.0.0.1:${APP_PORT:-5000}:5000"
    volumes:
      - ${UPLOADS_DATA_PATH:-./data/uploads}:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
