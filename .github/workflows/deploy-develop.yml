name: Build and deploy develop

on:
  push:
    branches:
      - develop

concurrency:
  group: deploy-develop
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  # GHCR image names must be lowercase. Keep this aligned with the GitHub repo.
  IMAGE_NAME: ghcr.io/antgst/kerno-mvp
  IMAGE_TAG: develop

jobs:
  build-and-push:
    name: Build and publish image
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Sign in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            ${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy on Kerno server
    needs: build-and-push
    runs-on: [self-hosted, Linux, X64]
    environment: develop

    permissions:
      contents: read
      packages: read

    steps:
      - name: Check out deployment configuration
        uses: actions/checkout@v4

      - name: Sign in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull image and restart Kerno
        env:
          DEPLOY_PATH: /home/ausa/kerno-mvp
        run: |
          install -m 0644 deployment/compose.production.yaml "$DEPLOY_PATH/compose.production.yaml"
          cd "$DEPLOY_PATH"
          export KERNO_IMAGE="${{ env.IMAGE_NAME }}"
          export KERNO_TAG="${{ env.IMAGE_TAG }}"
          docker compose --env-file data/.env -f compose.production.yaml pull app
          docker compose --env-file data/.env -f compose.production.yaml up -d --remove-orphans
          for attempt in $(seq 1 20); do
            curl --fail --silent --show-error http://127.0.0.1:5000/api/health && exit 0
            sleep 2
          done
          docker compose --env-file data/.env -f compose.production.yaml logs --tail=100 app
          exit 1
